# ===== Cấu hình JWT =====
# Khóa bí mật mã hóa Base64 (thay đổi trong môi trường production!)
# Thời gian hết hạn: 7 ngày = 604800000 ms (để dev/test dễ dàng)
jwt:
  secret: Y29tLmhjbXVucmUubGlicmFyeS5zZWNyZXQua2V5LmZvci5qd3QuYXV0aGVudGljYXRpb24uc3VwZXIuc2VjdXJl
  expiration: 604800000

# ===== Cấu hình Logging =====
# Log ghi vào file logs/library.log, tự động xoay mỗi 10MB, giữ 30 ngày
logging:
  file:
    name: logs/library.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
  level:
    # Log của ứng dụng (INFO trở lên)
    com.hcmunre.library: INFO
    # Tắt log SQL chi tiết khi production (chỉ bật khi debug)
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN